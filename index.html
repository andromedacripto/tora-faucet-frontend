<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TORA Faucet</title>
  <script src="https://cdn.jsdelivr.net/npm/web3@1.8.2/dist/web3.min.js"></script>
  <script src="https://www.google.com/recaptcha/api.js" async defer></script>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: 'Orbitron', sans-serif;
      background-color: #000;
      background-image: radial-gradient(#00ffc3 1px, transparent 1px);
      background-size: 40px 40px;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      color: #00ffc3;
    }
    .container {
      background-color: rgba(0, 0, 0, 0.8);
      border: 2px solid #00ffc3;
      border-radius: 20px;
      padding: 40px;
      text-align: center;
      box-shadow: 0 0 30px #00ffc3;
      width: 90%;
      max-width: 400px;
    }
    h1 {
      font-size: 2em;
      margin-bottom: 10px;
    }
    p {
      margin-bottom: 30px;
      color: #aafff1;
    }
    input {
      padding: 12px;
      border-radius: 8px;
      border: none;
      width: 100%;
      font-size: 1em;
      margin-bottom: 20px;
      background-color: #111;
      color: #00ffc3;
    }
    button {
      background-color: #00ffc3;
      color: #000;
      border: none;
      padding: 14px 28px;
      font-size: 1em;
      border-radius: 10px;
      cursor: pointer;
      transition: 0.3s;
      width: 100%;
      margin-bottom: 20px;
    }
    button:hover {
      background-color: #00c5a4;
    }
    #txResult a {
      color: #00ffc3;
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>TORA FAUCET</h1>
    <p>Claim 10 TORA every 24h on Sepolia</p>

    <form id="faucetForm">
      <input type="text" id="walletAddress" placeholder="Enter your wallet address" required />
      <div class="g-recaptcha" data-sitekey="6LcKmGUrAAAAAD-9GitbSxFI3yZAWQAhjA20fGGr"></div>
      <button type="submit">CLAIM FAUCET</button>
    </form>

    <div id="txResult"></div>
  </div>

  <script>
    document.getElementById("faucetForm").addEventListener("submit", async function (e) {
      e.preventDefault();

      const address = document.getElementById("walletAddress").value.trim();
      const captchaResponse = grecaptcha.getResponse();

      if (!/^0x[a-fA-F0-9]{40}$/.test(address)) {
        alert("Please enter a valid wallet address.");
        return;
      }

      if (!captchaResponse) {
        alert("Please complete the CAPTCHA.");
        return;
      }

      try {
        const response = await fetch("http://localhost:3000/verify-captcha", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            response: captchaResponse,
            address: address
          })
        });

        const result = await response.json();

        if (result.success) {
          const txHash = result.txHash;
          const shortTx = txHash.slice(0, 6) + "..." + txHash.slice(-4);
          const url = `https://sepolia.etherscan.io/tx/${txHash}`;

          // Exibir link clicável
          document.getElementById("txResult").innerHTML = 
            `✅ 10 TORA sent! Tx: <a href="${url}" target="_blank" rel="noopener noreferrer">${shortTx}</a>`;

          alert(`✅ 10 TORA sent! Tx: ${shortTx}\nVeja no explorer: ${url}`);

          grecaptcha.reset();
          document.getElementById("walletAddress").value = "";
        } else {
          alert(`❌ Error: ${result.message || "Unknown error"}`);
          grecaptcha.reset();
        }
      } catch (error) {
        console.error(error);
        alert("❌ Network or server error.");
        grecaptcha.reset();
      }
    });
  </script>
</body>
</html>
