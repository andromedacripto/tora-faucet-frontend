<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TORA Faucet</title>
  <script src="https://cdn.jsdelivr.net/npm/web3@1.8.2/dist/web3.min.js"></script>
  <script src="https://www.google.com/recaptcha/api.js" async defer></script>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: 'Orbitron', sans-serif;
      background-color: #000;
      background-image: radial-gradient(#00ffc3 1px, transparent 1px);
      background-size: 40px 40px;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      color: #00ffc3;
    }
    .container {
      background-color: rgba(0, 0, 0, 0.8);
      border: 2px solid #00ffc3;
      border-radius: 20px;
      padding: 40px;
      text-align: center;
      box-shadow: 0 0 30px #00ffc3;
      width: 90%;
      max-width: 400px;
    }
    h1 {
      font-size: 2em;
      margin-bottom: 10px;
    }
    p {
      margin-bottom: 30px;
      color: #aafff1;
    }
    input {
      padding: 12px;
      border-radius: 8px;
      border: none;
      width: 100%;
      font-size: 1em;
      margin-bottom: 20px;
      background-color: #111;
      color: #00ffc3;
    }
    button {
      background-color: #00ffc3;
      color: #000;
      border: none;
      padding: 14px 28px;
      font-size: 1em;
      border-radius: 10px;
      cursor: pointer;
      transition: 0.3s;
      width: 100%;
    }
    button:hover {
      background-color: #00c5a4;
    }
    #message {
      margin-top: 15px;
      font-weight: 700;
      font-size: 1.1em;
      color: #00ffc3;
      background: rgba(0, 255, 195, 0.15);
      padding: 10px 15px;
      border-radius: 12px;
      box-shadow: 0 0 15px #00ffc3;
      user-select: text;
      word-break: break-word;
      min-height: 40px;
    }
    #message.error {
      color: #ff4d4d;
      background: rgba(255, 77, 77, 0.15);
      box-shadow: 0 0 15px #ff4d4d;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>TORA FAUCET</h1>
    <p>Claim 10 TORA every 24h on Sepolia</p>

    <form id="faucetForm">
      <input type="text" id="walletAddress" placeholder="Enter your wallet address" required />
      <div class="g-recaptcha" data-sitekey="6LcKmGUrAAAAAD-9GitbSxFI3yZAWQAhjA20fGGr"></div>
      <button type="submit">CLAIM FAUCET</button>
      <div id="message"></div>
    </form>
  </div>

  <script>
    const messageDiv = document.getElementById('message');

    function abreviarTx(txHash) {
      if (!txHash || txHash.length < 10) return txHash;
      return txHash.slice(0, 8) + "..." + txHash.slice(-4);
    }

    function setMessage(text, isError = false) {
      messageDiv.textContent = text;
      if (isError) {
        messageDiv.classList.add("error");
      } else {
        messageDiv.classList.remove("error");
      }
    }

    function canClaim(address) {
      const lastClaim = localStorage.getItem(`lastClaim_${address}`);
      if (!lastClaim) return true;
      const now = Date.now();
      const diff = now - parseInt(lastClaim, 10);
      return diff >= 24 * 60 * 60 * 1000; // 24 horas em ms
    }

    function setClaimTimestamp(address) {
      localStorage.setItem(`lastClaim_${address}`, Date.now().toString());
    }

    document.getElementById("faucetForm").addEventListener("submit", async function (e) {
      e.preventDefault();

      const address = document.getElementById("walletAddress").value.trim();
      const captchaResponse = grecaptcha.getResponse();

      if (!/^0x[a-fA-F0-9]{40}$/.test(address)) {
        setMessage("Please enter a valid wallet address.", true);
        return;
      }

      if (!captchaResponse) {
        setMessage("Please complete the CAPTCHA.", true);
        return;
      }

      if (!canClaim(address)) {
        setMessage("⏳ You can claim only once every 24 hours. Please try again later.", true);
        return;
      }

      try {
        const response = await fetch("https://tora-faucet-backend.onrender.com/verify-captcha", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            response: captchaResponse,
            address: address
          })
        });

        const result = await response.json();

        if (result.success) {
          setMessage(`✅ 10 TORA sent! Tx: ${abreviarTx(result.txHash)}`);
          grecaptcha.reset();
          document.getElementById("walletAddress").value = "";
          setClaimTimestamp(address);
        } else {
          setMessage(`❌ Error: ${result.message || "Unknown error"}`, true);
          grecaptcha.reset();
        }
      } catch (error) {
        console.error(error);
        setMessage("❌ Network or server error.", true);
        grecaptcha.reset();
      }
    });
  </script>
</body>
</html>
